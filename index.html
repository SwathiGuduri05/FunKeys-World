<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Baloo+2&display=swap" rel="stylesheet">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kids Fun Learning</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Fredoka', cursive;
  position: relative;
  background: linear-gradient(#87ceeb, #e0ffff);
}

.cloud {
  position: absolute;
  width: 260px;
  opacity: 0.6;
  filter: blur(2px) brightness(0) invert(1);
  z-index: 0;
}

.cloud1 { top: 60px; left: -300px; animation: float1 40s linear infinite; }
.cloud2 { top: 180px; left: -350px; animation: float2 55s linear infinite; }
.cloud3 { top: 300px; left: -320px; animation: float3 70s linear infinite; }

@keyframes float1 { from {transform: translateX(0);} to {transform: translateX(130vw);} }
@keyframes float2 { from {transform: translateX(0);} to {transform: translateX(130vw);} }
@keyframes float3 { from {transform: translateX(0);} to {transform: translateX(130vw);} }

.container {
  position: absolute;
  text-align: center;
  transform: translate(-50%, -50%);
  z-index: 2;
}

.letter { font-size: 80px; color: #ff4d6d; }
.word { font-size: 40px; font-family: 'Baloo 2'; color:#000; }
.img { font-size: 70px; }
</style>
</head>

<body>

<img src="https://cdn-icons-png.flaticon.com/512/414/414825.png" class="cloud cloud1">
<img src="https://cdn-icons-png.flaticon.com/512/414/414825.png" class="cloud cloud2">
<img src="https://cdn-icons-png.flaticon.com/512/414/414825.png" class="cloud cloud3">

<script>

const words = {
A:["apple","ant"], B:["ball","banana"], C:["cat","car"], D:["dog","duck"],
E:["elephant","egg"], F:["fish","frog"], G:["grapes","goat"], H:["hat","horse"],
I:["ice cream","igloo"], J:["juice","jar"], K:["kite","key"], L:["lion","lamp"],
M:["mango","monkey"], N:["nest","nose"], O:["orange","owl"], P:["parrot","pencil"],
Q:["queen","quilt"], R:["rabbit","rose"], S:["sun","star"], T:["tiger","table"],
U:["umbrella","unicorn"], V:["van","violin"], W:["watch","whale"], X:["xylophone","x-ray"],
Y:["yak","yacht"], Z:["zebra","zoo"]
};

const extraKeys = {
"ArrowLeft": {word:"left", emoji:"⬅️"},
"ArrowRight": {word:"right", emoji:"➡️"},
"ArrowUp": {word:"up", emoji:"⬆️"},
"ArrowDown": {word:"down", emoji:"⬇️"},
"Shift": {word:"shift", emoji:"⬆️"},
"Control": {word:"control", emoji:"🎮"},
"Alt": {word:"alt", emoji:"🔀"},
"Enter": {word:"enter", emoji:"⏎"},
"Backspace": {word:"backspace", emoji:"⬅️"},
"Tab": {word:"tab", emoji:"↹"},
"Escape": {word:"escape", emoji:"⎋"},
"CapsLock": {word:"caps lock", emoji:"🔠"},
"Delete": {word:"delete", emoji:"❌"},
"Home": {word:"home", emoji:"🏠"},
"End": {word:"end", emoji:"🔚"},
"PageUp": {word:"page up", emoji:"📄"},
"PageDown": {word:"page down", emoji:"📃"},
" ": {word:"space", emoji:"⭐"},

";": {word:"semicolon", emoji:";"},
":": {word:"colon", emoji:":"},
"'": {word:"apostrophe", emoji:"'"},
"\"": {word:"quotation", emoji:"\""},
"\\": {word:"backslash", emoji:"\\"},
".": {word:"dot", emoji:"."},
",": {word:"comma", emoji:","}
};

const emojiMap = { apple:"🍎", ant:"🐜", ball:"⚽", banana:"🍌", cat:"🐱", car:"🚗", dog:"🐶", duck:"🦆" };

const randomThings = [
{word:"dog",emoji:"🐶"},{word:"cat",emoji:"🐱"},{word:"apple",emoji:"🍎"},
{word:"banana",emoji:"🍌"},{word:"car",emoji:"🚗"},{word:"flower",emoji:"🌸"},
{word:"bird",emoji:"🐦"},{word:"fish",emoji:"🐟"},
{word:"eye",emoji:"👁️"},{word:"ear",emoji:"👂"},{word:"nose",emoji:"👃"}
];

const counters = {};
let positions = [];

function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.6;
  msg.pitch = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function getSafePosition() {
  let x, y, tries = 0;
  do {
    x = 100 + Math.random() * (window.innerWidth - 200);
    y = 100 + Math.random() * (window.innerHeight - 200);
    tries++;
  } while (positions.some(p => Math.abs(p.x - x) < 120 && Math.abs(p.y - y) < 120) && tries < 20);

  positions.push({x,y});
  if (positions.length > 15) positions.shift();
  return {x,y};
}

function show(key, word, emojiDisplay){
  const {x,y} = getSafePosition();

  const container=document.createElement("div");
  container.className="container";
  container.style.left=x+"px";
  container.style.top=y+"px";

  container.innerHTML = `
    <div class="letter">${key||""}</div>
    <div class="word">${word}</div>
    <div class="img">${emojiDisplay}</div>
  `;

  document.body.appendChild(container);
  speak(word);

  setTimeout(()=> container.remove(),2000);
}

function handleKey(key){
  if(/^[a-zA-Z]$/.test(key)){
    key=key.toUpperCase();
    const list=words[key];
    counters[key]=(counters[key]||0)+1;
    const word=list[counters[key]%list.length];
    show(key,word,emojiMap[word]||"⭐");
  }
  else if(extraKeys[key]){
    show(key,extraKeys[key].word,extraKeys[key].emoji);
  }
}

window.addEventListener("keydown",e=> handleKey(e.key));

window.addEventListener("click",()=>{
  const item=randomThings[Math.floor(Math.random()*randomThings.length)];
  show("",item.word,item.emoji);
});

window.addEventListener("touchstart",()=>{
  const item=randomThings[Math.floor(Math.random()*randomThings.length)];
  show("",item.word,item.emoji);
});

</script>

</body>
</html>
