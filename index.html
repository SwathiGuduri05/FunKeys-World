<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Baloo+2&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Fun Learning</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Fredoka', cursive;
      background: linear-gradient(180deg, #87ceeb, #e0ffff);
    }

    .container {
      position: absolute;
      text-align: center;
      transform: translate(-50%, -50%);
    }

    .letter {
      font-size: 80px;
      color: #ff4d6d;
    }

    .word {
      font-size: 40px;
      font-family: 'Baloo 2', cursive;
    }

    .img {
      font-size: 70px;
    }
  </style>
</head>
<body>

<script>

const words = {
  A:["apple","ant"], B:["ball","banana"], C:["cat","car"], D:["dog","duck"],
  E:["elephant","egg"], F:["fish","frog"], G:["grapes","goat"], H:["hat","horse"],
  I:["ice cream","igloo"], J:["juice","jar"], K:["kite","key"], L:["lion","lamp"],
  M:["mango","monkey"], N:["nest","nose"], O:["orange","owl"], P:["parrot","pencil"],
  Q:["queen","quilt"], R:["rabbit","rose"], S:["sun","star"], T:["tiger","table"],
  U:["umbrella","unicorn"], V:["van","violin"], W:["watch","whale"], X:["xylophone","x-ray"],
  Y:["yak","yacht"], Z:["zebra","zoo"]
};

const extraKeys = {
  "1": {word:"one", emoji:"1️⃣"},
  "2": {word:"two", emoji:"2️⃣"},
  "3": {word:"three", emoji:"3️⃣"},
  "4": {word:"four", emoji:"4️⃣"},
  "5": {word:"five", emoji:"5️⃣"},
  "6": {word:"six", emoji:"6️⃣"},
  "7": {word:"seven", emoji:"7️⃣"},
  "8": {word:"eight", emoji:"8️⃣"},
  "9": {word:"nine", emoji:"9️⃣"},
  "0": {word:"zero", emoji:"0️⃣"},

  "Enter": {word:"enter", emoji:"⏎"},
  " ": {word:"space", emoji:"⭐"},
  "Backspace": {word:"backspace", emoji:"⬅️"},
  "ArrowUp": {word:"up", emoji:"⬆️"},
  "ArrowDown": {word:"down", emoji:"⬇️"},
  "ArrowLeft": {word:"left", emoji:"⬅️"},
  "ArrowRight": {word:"right", emoji:"➡️"}
};

const emojiMap = {
  apple:"🍎", ant:"🐜", ball:"⚽", banana:"🍌", cat:"🐱", car:"🚗", dog:"🐶", duck:"🦆",
  elephant:"🐘", egg:"🥚", fish:"🐟", frog:"🐸", grapes:"🍇", goat:"🐐", hat:"🎩", horse:"🐴",
  "ice cream":"🍨", igloo:"🏠", juice:"🧃", jar:"🫙", kite:"🪁", key:"🔑", lion:"🦁", lamp:"💡",
  mango:"🥭", monkey:"🐒", nest:"🪺", nose:"👃", orange:"🍊", owl:"🦉", parrot:"🦜", pencil:"✏️",
  queen:"👸", quilt:"🛏️", rabbit:"🐰", rose:"🌹", sun:"☀️", star:"⭐", tiger:"🐯", table:"🪑",
  umbrella:"☂️", unicorn:"🦄", van:"🚐", violin:"🎻", watch:"⌚", whale:"🐋", xylophone:"🎶",
  "x-ray":"🩻", yak:"🐂", yacht:"⛵", zebra:"🦓", zoo:"🏫"
};

const counters = {};

function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.6;
  msg.pitch = 0.9;

  const voices = speechSynthesis.getVoices();
  const indianVoice = voices.find(v => v.lang === "en-IN") || voices[0];
  msg.voice = indianVoice;

  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function createVisual(key) {
  let word, emoji;

  if (words[key]) {
    const list = words[key];
    counters[key] = (counters[key] || 0) + 1;
    word = list[counters[key] % list.length];
    emoji = emojiMap[word];
  } else if (extraKeys[key]) {
    word = extraKeys[key].word;
    emoji = extraKeys[key].emoji;
  } else {
    return;
  }

  const container = document.createElement("div");
  container.className = "container";
  container.style.left = Math.random()*window.innerWidth + "px";
  container.style.top = Math.random()*window.innerHeight + "px";

  let emojiDisplay = "";

  // 🔢 Special logic for number keys (show multiple emojis)
  if (!isNaN(key)) {
    const count = parseInt(key);
    const emojiList = ["🍎","🐶","⭐","⚽","🍌","🐱","🚗","🌸","🐸","🍇"];
    const randomEmoji = emojiList[Math.floor(Math.random()*emojiList.length)];

    for (let i = 0; i < count; i++) {
      emojiDisplay += randomEmoji + " ";
    }
  } else {
    emojiDisplay = emoji || "✨";
  }

  container.innerHTML = `
    <div class="letter">${key}</div>
    <div class="word">${word}</div>
    <div class="img">${emojiDisplay}</div>
  `;

  document.body.appendChild(container);
  speak(word);

  setTimeout(()=>container.remove(),2000);
} else if (extraKeys[key]) {
    word = extraKeys[key].word;
    emoji = extraKeys[key].emoji;
  } else {
    return;
  }

  const container = document.createElement("div");
  container.className = "container";
  container.style.left = Math.random()*window.innerWidth + "px";
  container.style.top = Math.random()*window.innerHeight + "px";

  container.innerHTML = `
    <div class="letter">${key}</div>
    <div class="word">${word}</div>
    <div class="img">${emoji}</div>
  `;

  document.body.appendChild(container);
  speak(word);

  setTimeout(()=>container.remove(),2000);
}

window.addEventListener("keydown", (e)=>{
  let key = e.key;

  if (/^[a-zA-Z]$/.test(key)) key = key.toUpperCase();

  createVisual(key);
});

</script>

</body>
</html>
